name: Phoenix Protocol Health Check & Auto-Rollback

on:
  push:
    branches: [ main ]

jobs:
  health-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Wait for Render Deployment (Deployment Buffer)
        run: sleep 180

      - name: Ping Live Server
        id: health_check
        run: |
          curl -f ${{ secrets.APP_URL }}/ping/ || exit 1

      - name: Auto-Rollback on Failure
        if: failure()
        run: |
          git config --global user.name "Sre-AI-Guardian"
          git config --global user.email "sre-ai@anti-gravity.com"
          git revert HEAD --no-edit
          git push origin main
          echo "🚨 CRITICAL: Rollback triggered. Previous stable state restored."
